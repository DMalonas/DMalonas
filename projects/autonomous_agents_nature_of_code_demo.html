<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Autonomous Agents — Nature of Code Demo</title>
<style>
:root{
  --bg:#07101f;--panel:#101d33;--text:#eef6ff;--muted:#9fb3c8;--line:rgba(255,255,255,.13);
  --blue:#54a9ff;--green:#49d69b;--yellow:#ffd166;--red:#ff6b6b;--purple:#b794f4;--cyan:#69e3ff;
}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:var(--text);
background:radial-gradient(circle at 20% 0%,rgba(84,169,255,.16),transparent 28%),radial-gradient(circle at 80% 0%,rgba(183,148,244,.14),transparent 28%),var(--bg)}
header,.bar,main,footer{max-width:1180px;margin:auto} header{padding:26px 18px 10px}
h1{margin:0 0 8px;font-size:clamp(26px,4vw,44px);line-height:1.05;letter-spacing:-.04em}
p{margin:0}.sub{color:var(--muted);max-width:870px;line-height:1.45}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}.pill{border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.045);font-size:13px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;vertical-align:middle}
.blue{background:var(--blue)}.green{background:var(--green)}.yellow{background:var(--yellow)}.red{background:var(--red)}.purple{background:var(--purple)}.cyan{background:var(--cyan)}
.bar{padding:0 18px 14px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
button,.check{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#192b49,#102039);color:var(--text);padding:10px 13px;font:inherit;font-weight:700}
.check{background:rgba(255,255,255,.045);font-weight:500;color:var(--muted)}
main{padding:0 18px 30px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.card{border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,rgba(17,31,54,.96),rgba(10,18,32,.98));box-shadow:0 18px 44px rgba(0,0,0,.25);overflow:hidden}
.card.wide{grid-column:1/-1}.head{display:grid;grid-template-columns:1fr auto;gap:8px;padding:14px 14px 10px;border-bottom:1px solid var(--line)}
h2{font-size:18px;margin:0}.tag{border-radius:999px;padding:4px 8px;font-size:12px;color:#06101e;font-weight:900}.note{grid-column:1/-1;color:var(--muted);font-size:13px;line-height:1.35}
.formula{grid-column:1/-1;justify-self:start;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;color:#d9eeff;background:rgba(84,169,255,.08);border:1px solid rgba(84,169,255,.3);border-radius:8px;padding:5px 7px}
.canvas-wrap{padding:12px}canvas{display:block;width:100%;height:auto;background:#07101f;border:1px solid rgba(255,255,255,.1);border-radius:16px;touch-action:none}
.controls{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;padding:0 12px 13px}.control{border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);padding:8px}
.control label{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px;margin-bottom:6px}input[type=range]{width:100%}
footer{padding:0 18px 26px;color:var(--muted);font-size:12px}@media(max-width:880px){main{grid-template-columns:1fr}.controls{grid-template-columns:1fr}.card.wide{grid-column:auto}}
</style>
</head>
<body>
<header>
  <h1>Autonomous Agents — Steering Demo</h1>
  <p class="sub">One single HTML file. Each box shows a movement behavior: seek, arrive, flee, wander, flow field, path following, and flocking.</p>
  <div class="legend">
    <span class="pill"><span class="dot blue"></span>target / desired</span>
    <span class="pill"><span class="dot green"></span>agent</span>
    <span class="pill"><span class="dot yellow"></span>path / field</span>
    <span class="pill"><span class="dot red"></span>danger</span>
    <span class="pill"><span class="dot purple"></span>group rules</span>
  </div>
</header>
<div class="bar">
  <button id="pauseBtn">Pause</button>
  <button id="resetBtn">Reset all</button>
  <label class="check"><input id="trailToggle" type="checkbox" checked> soft trails</label>
</div>
<main id="grid"></main>
<footer>Open locally in a browser. No libraries, no network, no build step.</footer>

<script>
(() => {
'use strict';

const C={bg:'#07101f',grid:'rgba(255,255,255,.06)',muted:'rgba(219,234,254,.65)',blue:'#54a9ff',green:'#49d69b',yellow:'#ffd166',red:'#ff6b6b',purple:'#b794f4',cyan:'#69e3ff'};
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const map=(n,a,b,c,d)=>c+(d-c)*((n-a)/(b-a));
const rand=(a,b)=>a+Math.random()*(b-a);
const defs=[
 {id:'seek',title:'1. Seek',tag:'target',color:'blue',note:'Click/drag. The vehicle turns toward the target.',formula:'steer = desired − velocity',sl:[['speed','max speed',1,9,.1,5.2,1],['force','max force',.02,.8,.01,.18,2],['target','target size',6,36,1,18,0]]},
 {id:'arrive',title:'2. Arrive',tag:'slow down',color:'green',note:'Click/drag. The agent slows near the target.',formula:'near target → lower desired speed',sl:[['speed','max speed',1,9,.1,5.6,1],['force','max force',.02,.8,.01,.24,2],['radius','slow radius',30,180,1,115,0]]},
 {id:'flee',title:'3. Flee',tag:'avoid',color:'red',note:'Move the red danger circle. The agent flees inside its fear radius.',formula:'desired = away from danger',sl:[['radius','fear radius',40,180,1,115,0],['wander','wander',0,1.5,.05,.55,2],['force','flee force',.05,1,.01,.42,2]]},
 {id:'wander',title:'4. Wander',tag:'random smooth',color:'cyan',note:'A shifting target on a circle creates smooth wandering.',formula:'future point + shifting angle',sl:[['jitter','jitter',.02,1.2,.01,.35,2],['dist','circle distance',20,120,1,72,0],['rad','circle radius',10,80,1,35,0]]},
 {id:'flow',title:'5. Flow Field',tag:'grid vectors',color:'yellow',note:'Each grid cell has a vector. Agents follow the local arrow.',formula:'desired = local field vector',sl:[['count','agents',5,80,1,34,0],['swirl','field swirl',.1,4,.1,1.6,1],['speed','field speed',0,3,.05,1,2]]},
 {id:'path',title:'6. Path Following',tag:'route',color:'yellow',note:'Predict future point, project to path, then seek a point ahead.',formula:'future → normal → target ahead',sl:[['radius','path radius',8,70,1,30,0],['ahead','look ahead',10,90,1,38,0],['debug','debug lines',0,1,1,1,0]]},
 {id:'flock',title:'7. Flocking / Boids',tag:'emergent group',color:'purple',note:'Three local rules: separation, alignment, cohesion.',formula:'flock = avoid + copy + group-center',wide:true,w:1080,h:380,sl:[['count','boids',8,130,1,62,0],['sep','separation',0,3,.05,1.55,2],['align','alignment',0,3,.05,1,2],['coh','cohesion',0,3,.05,.9,2],['per','perception',20,120,1,58,0],['links','show links',0,1,1,0,0]]}
];

function makeUI(){
  const grid=document.getElementById('grid');
  for(const d of defs){
    const card=document.createElement('section'); card.className='card'+(d.wide?' wide':'');
    card.innerHTML=`<div class="head"><h2>${d.title}</h2><span class="tag ${d.color}">${d.tag}</span><p class="note">${d.note}</p><span class="formula">${d.formula}</span></div>
      <div class="canvas-wrap"><canvas id="${d.id}_canvas" width="${d.w||520}" height="${d.h||320}"></canvas></div>
      <div class="controls">${d.sl.map(s=>`<div class="control"><label>${s[1]} <span id="${d.id}_${s[0]}_v"></span></label><input id="${d.id}_${s[0]}" type="range" min="${s[2]}" max="${s[3]}" step="${s[4]}" value="${s[5]}"></div>`).join('')}</div>`;
    grid.appendChild(card);
    for(const s of d.sl){
      const input=document.getElementById(`${d.id}_${s[0]}`), out=document.getElementById(`${d.id}_${s[0]}_v`);
      const sync=()=>{const v=Number(input.value); out.textContent=s[6]===0?String(v):v.toFixed(s[6]);};
      input.addEventListener('input',sync); sync();
    }
  }
}
makeUI();

class V{
  constructor(x=0,y=0){this.x=x;this.y=y}
  copy(){return new V(this.x,this.y)} set(x,y){this.x=x;this.y=y;return this}
  add(v){this.x+=v.x;this.y+=v.y;return this} sub(v){this.x-=v.x;this.y-=v.y;return this}
  mult(n){this.x*=n;this.y*=n;return this} div(n){if(n){this.x/=n;this.y/=n}return this}
  magSq(){return this.x*this.x+this.y*this.y} mag(){return Math.sqrt(this.magSq())}
  norm(){const m=this.mag();return m?this.div(m):this} setMag(n){return this.norm().mult(n)}
  limit(n){if(this.magSq()>n*n)this.setMag(n);return this} head(){return Math.atan2(this.y,this.x)}
  static add(a,b){return new V(a.x+b.x,a.y+b.y)} static sub(a,b){return new V(a.x-b.x,a.y-b.y)}
  static dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)} static angle(a,m=1){return new V(Math.cos(a)*m,Math.sin(a)*m)}
}
function hs(hex,a){const h=hex.slice(1);return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;}
function arrow(ctx,p,v,color,scale=1){const e=V.add(p,v.copy().mult(scale)),ang=Math.atan2(e.y-p.y,e.x-p.x);ctx.save();ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(e.x,e.y);ctx.stroke();ctx.beginPath();ctx.moveTo(e.x,e.y);ctx.lineTo(e.x-6*Math.cos(ang-.45),e.y-6*Math.sin(ang-.45));ctx.lineTo(e.x-6*Math.cos(ang+.45),e.y-6*Math.sin(ang+.45));ctx.closePath();ctx.fill();ctx.restore();}

class Agent{
  constructor(x,y,o={}){this.pos=new V(x,y);this.vel=o.vel||V.angle(rand(0,Math.PI*2),rand(.8,2.5));this.acc=new V();this.maxSpeed=o.maxSpeed??4;this.maxForce=o.maxForce??.18;this.r=o.r??8;this.wTheta=rand(0,Math.PI*2);this.db={};}
  apply(f){this.acc.add(f)}
  seek(target,slow=0){const desired=V.sub(target,this.pos),d=desired.mag();if(d<.001)return new V();let sp=this.maxSpeed;if(slow&&d<slow)sp=map(d,0,slow,0,this.maxSpeed);desired.setMag(sp);const steer=V.sub(desired,this.vel).limit(this.maxForce);this.apply(steer);this.db.desired=V.add(this.pos,desired.copy().setMag(42));return steer}
  flee(target,radius,boost=1){const d=V.dist(this.pos,target);if(d>radius)return new V();const desired=V.sub(this.pos,target).setMag(this.maxSpeed),steer=V.sub(desired,this.vel).limit(this.maxForce*boost);this.apply(steer);return steer}
  follow(vec){const desired=vec.copy().setMag(this.maxSpeed),steer=V.sub(desired,this.vel).limit(this.maxForce);this.apply(steer);return steer}
  wander(o={}){const dist=o.dist??64,rad=o.rad??32,jit=o.jitter??.28;this.wTheta+=rand(-jit,jit);const f=this.vel.copy();if(f.magSq()<.01)f.set(1,0);f.setMag(dist);const center=V.add(this.pos,f),target=V.add(center,V.angle(this.wTheta+this.vel.head(),rad));this.seek(target);this.db.wander={center,rad,target};return target}
  update(b,mode='wrap'){this.vel.add(this.acc).limit(this.maxSpeed);this.pos.add(this.vel);this.acc.mult(0);mode==='bounce'?this.bounce(b):this.wrap(b)}
  wrap(b){const p=this.r+2;if(this.pos.x<-p)this.pos.x=b.w+p;if(this.pos.y<-p)this.pos.y=b.h+p;if(this.pos.x>b.w+p)this.pos.x=-p;if(this.pos.y>b.h+p)this.pos.y=-p}
  bounce(b){const p=this.r;if(this.pos.x<p){this.pos.x=p;this.vel.x*=-.8}if(this.pos.x>b.w-p){this.pos.x=b.w-p;this.vel.x*=-.8}if(this.pos.y<p){this.pos.y=p;this.vel.y*=-.8}if(this.pos.y>b.h-p){this.pos.y=b.h-p;this.vel.y*=-.8}}
  draw(ctx,color=C.green,scale=1){const a=this.vel.head(),r=this.r*scale;ctx.save();ctx.translate(this.pos.x,this.pos.y);ctx.rotate(a);ctx.beginPath();ctx.moveTo(r*2.2,0);ctx.lineTo(-r*1.4,-r);ctx.lineTo(-r*.7,0);ctx.lineTo(-r*1.4,r);ctx.closePath();ctx.fillStyle=color;ctx.strokeStyle='rgba(255,255,255,.75)';ctx.fill();ctx.stroke();ctx.restore()}
}

class Base{
  constructor(id){this.id=id;this.cv=document.getElementById(id+'_canvas');this.ctx=this.cv.getContext('2d');this.w=this.cv.width;this.h=this.cv.height;this.mouse=new V(this.w/2,this.h/2);this.down=false;this.seen=false;this.t=0;this.pointer()}
  val(k){return Number(document.getElementById(`${this.id}_${k}`).value)}
  pointer(){const set=e=>{const r=this.cv.getBoundingClientRect();this.mouse.set((e.clientX-r.left)*this.cv.width/r.width,(e.clientY-r.top)*this.cv.height/r.height);this.seen=true};this.cv.addEventListener('pointerdown',e=>{this.down=true;set(e)});this.cv.addEventListener('pointermove',set);window.addEventListener('pointerup',()=>this.down=false)}
  clear(){this.ctx.fillStyle=document.getElementById('trailToggle').checked?'rgba(7,16,31,.21)':C.bg;this.ctx.fillRect(0,0,this.w,this.h)}
  grid(step=40){const x=this.ctx;x.save();x.strokeStyle=C.grid;x.lineWidth=1;for(let i=0;i<=this.w;i+=step){x.beginPath();x.moveTo(i,0);x.lineTo(i,this.h);x.stroke()}for(let j=0;j<=this.h;j+=step){x.beginPath();x.moveTo(0,j);x.lineTo(this.w,j);x.stroke()}x.restore()}
  circle(p,r,color,a=.18,line=true){const x=this.ctx;x.save();x.beginPath();x.arc(p.x,p.y,r,0,Math.PI*2);x.fillStyle=hs(color,a);x.fill();if(line){x.strokeStyle=color;x.lineWidth=2;x.stroke()}x.restore()}
  line(a,b,color,w=1.5){const x=this.ctx;x.save();x.strokeStyle=color;x.lineWidth=w;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();x.restore()}
  label(txt,x=14,y=this.h-16,color=C.muted){const c=this.ctx;c.save();c.fillStyle=color;c.font='12px system-ui,sans-serif';c.fillText(txt,x,y);c.restore()}
  reset(){} tick(){this.t++}
}

class SeekDemo extends Base{
 reset(){this.a=new Agent(80,this.h*.52,{maxSpeed:5.2,maxForce:.18});this.target=new V(this.w*.74,this.h*.46)}
 tick(){super.tick();this.clear();this.grid();if(this.seen)this.target=this.mouse.copy();this.a.maxSpeed=this.val('speed');this.a.maxForce=this.val('force');this.a.seek(this.target);this.a.update({w:this.w,h:this.h},'bounce');this.circle(this.target,this.val('target'),C.blue,.18);this.line(this.a.pos,this.target,'rgba(84,169,255,.18)',1);if(this.a.db.desired)arrow(this.ctx,this.a.pos,V.sub(this.a.db.desired,this.a.pos),C.blue);arrow(this.ctx,this.a.pos,this.a.vel.copy().setMag(44),C.green);this.a.draw(this.ctx);this.label('blue = desired, green = current velocity')}
}
class ArriveDemo extends Base{
 reset(){this.a=new Agent(80,this.h*.48,{maxSpeed:5.6,maxForce:.24});this.target=new V(this.w*.72,this.h*.5)}
 tick(){super.tick();this.clear();this.grid();if(this.seen)this.target=this.mouse.copy();this.a.maxSpeed=this.val('speed');this.a.maxForce=this.val('force');const r=this.val('radius');this.a.seek(this.target,r);this.a.update({w:this.w,h:this.h},'bounce');this.circle(this.target,r,C.green,.04);this.circle(this.target,14,C.blue,.22);this.line(this.a.pos,this.target,'rgba(84,169,255,.16)',1);this.a.draw(this.ctx);const sp=this.a.vel.mag();this.ctx.fillStyle='rgba(255,255,255,.1)';this.ctx.fillRect(14,this.h-30,120,10);this.ctx.fillStyle=C.green;this.ctx.fillRect(14,this.h-30,120*clamp(sp/this.a.maxSpeed,0,1),10);this.label(`speed ${sp.toFixed(2)}`,14,this.h-38)}
}
class FleeDemo extends Base{
 reset(){this.a=new Agent(this.w*.58,this.h*.5,{maxSpeed:4.3,maxForce:.25});this.pred=new V(this.w*.34,this.h*.5)}
 tick(){super.tick();this.clear();this.grid();if(this.seen)this.pred=this.mouse.copy();else this.pred.set(this.w*.5+Math.cos(this.t*.014)*150,this.h*.5+Math.sin(this.t*.019)*80);const fear=this.val('radius'),wander=this.val('wander');this.a.maxForce=.14;if(wander){this.a.wander({dist:58,rad:28,jitter:.24*wander});this.a.acc.mult(.65+wander*.15)}this.a.maxForce=this.val('force');this.a.flee(this.pred,fear,1.7);this.a.update({w:this.w,h:this.h},'wrap');this.circle(this.pred,fear,C.red,.045);this.circle(this.pred,16,C.red,.28);this.a.draw(this.ctx);this.label(V.dist(this.a.pos,this.pred)<fear?'DANGER: fleeing':'safe: wandering',14,this.h-16,V.dist(this.a.pos,this.pred)<fear?C.red:C.muted)}
}
class WanderDemo extends Base{
 reset(){this.a=new Agent(this.w*.5,this.h*.5,{maxSpeed:3.5,maxForce:.14})}
 tick(){super.tick();this.clear();this.grid();this.a.wander({jitter:this.val('jitter'),dist:this.val('dist'),rad:this.val('rad')});this.a.update({w:this.w,h:this.h},'wrap');const d=this.a.db.wander;if(d){this.circle(d.center,d.rad,C.cyan,.035);this.circle(d.target,7,C.blue,.22);this.line(this.a.pos,d.center,'rgba(105,227,255,.25)',1)}this.a.draw(this.ctx);this.label('wander target drifts around the forward circle')}
}
class FlowDemo extends Base{
 reset(){this.ag=[];this.ensure()}
 ensure(){const n=this.val('count');while(this.ag.length<n)this.ag.push(new Agent(rand(0,this.w),rand(0,this.h),{maxSpeed:rand(2,3.5),maxForce:.1,r:rand(4,7)}));while(this.ag.length>n)this.ag.pop()}
 field(x,y){const sw=this.val('swirl'),sp=this.val('speed');const a=Math.sin(x*.018*sw+this.t*.010*sp)+Math.cos(y*.021*sw-this.t*.011*sp);const b=Math.sin((x+y)*.011*sw+this.t*.006*sp);return V.angle((a+b)*Math.PI)}
 drawField(){const step=32;this.ctx.save();this.ctx.globalAlpha=.7;for(let x=step/2;x<this.w;x+=step)for(let y=step/2;y<this.h;y+=step)arrow(this.ctx,new V(x,y),this.field(x,y),C.yellow,15);this.ctx.restore()}
 tick(){super.tick();this.clear();this.ensure();this.drawField();for(const a of this.ag){a.maxSpeed=2.4+this.val('speed')*.75;a.follow(this.field(a.pos.x,a.pos.y));a.update({w:this.w,h:this.h},'wrap');a.draw(this.ctx,C.green,.75)}this.label('yellow arrows = local desired velocity')}
}
function nearestPoint(p,a,b){const ap=V.sub(p,a),ab=V.sub(b,a),t=ab.magSq()?clamp((ap.x*ab.x+ap.y*ab.y)/ab.magSq(),0,1):0;return new V(a.x+ab.x*t,a.y+ab.y*t)}
class PathDemo extends Base{
 reset(){this.points=[new V(-30,this.h-70),new V(95,70),new V(210,120),new V(325,240),new V(440,92),new V(this.w+40,172)];this.a=new Agent(10,this.h-95,{maxSpeed:4.1,maxForce:.18,vel:new V(3,-1.2)});this.db=null}
 follow(){const radius=this.val('radius'),ahead=this.val('ahead');const future=this.a.vel.copy();if(future.magSq()<.01)future.set(1,0);future.setMag(ahead).add(this.a.pos);let best={distance:Infinity};for(let i=0;i<this.points.length-1;i++){const p=this.points[i],q=this.points[i+1],normal=nearestPoint(future,p,q),distance=V.dist(future,normal);if(distance<best.distance){best={distance,normal,target:V.add(normal,V.sub(q,p).setMag(ahead)),p,q}}}this.db={future,...best,radius};if(best.distance>radius)this.a.seek(best.target);else this.a.apply(V.angle(this.a.vel.head(),.015))}
 drawPath(){const c=this.ctx,r=this.val('radius');c.save();c.lineCap='round';c.lineJoin='round';c.strokeStyle='rgba(255,209,102,.12)';c.lineWidth=r*2;c.beginPath();this.points.forEach((p,i)=>i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y));c.stroke();c.strokeStyle=C.yellow;c.lineWidth=3;c.beginPath();this.points.forEach((p,i)=>i?c.lineTo(p.x,p.y):c.moveTo(p.x,p.y));c.stroke();c.restore()}
 tick(){super.tick();this.clear();this.drawPath();this.follow();this.a.update({w:this.w,h:this.h},'wrap');if(this.a.pos.x<5||this.a.pos.x>this.w-5){this.a.pos.set(8,this.h-90+rand(-12,12));this.a.vel.set(3,-1)}if(this.val('debug')&&this.db){this.circle(this.db.future,5,C.cyan,.25);this.circle(this.db.normal,5,C.yellow,.25);this.circle(this.db.target,7,C.blue,.25);this.line(this.db.future,this.db.normal,C.cyan);this.line(this.db.normal,this.db.target,C.blue);this.label('cyan=future, yellow=normal, blue=target ahead')}this.a.draw(this.ctx)}
}
class Boid extends Agent{
 separate(boids,dist){const sum=new V();let n=0;for(const o of boids){const d=V.dist(this.pos,o.pos);if(o!==this&&d>0&&d<dist){sum.add(V.sub(this.pos,o.pos).norm().div(d));n++}}if(!n)return sum;sum.div(n).setMag(this.maxSpeed);return V.sub(sum,this.vel).limit(this.maxForce)}
 align(boids,per){const sum=new V();let n=0;for(const o of boids){const d=V.dist(this.pos,o.pos);if(o!==this&&d<per){sum.add(o.vel);n++}}if(!n)return sum;sum.div(n).setMag(this.maxSpeed);return V.sub(sum,this.vel).limit(this.maxForce)}
 cohere(boids,per){const sum=new V();let n=0;for(const o of boids){const d=V.dist(this.pos,o.pos);if(o!==this&&d<per){sum.add(o.pos);n++}}if(!n)return sum;sum.div(n);return V.sub(V.sub(sum,this.pos).setMag(this.maxSpeed),this.vel).limit(this.maxForce)}
 flock(boids,o){this.apply(this.separate(boids,o.sepDist).mult(o.sep));this.apply(this.align(boids,o.per).mult(o.align));this.apply(this.cohere(boids,o.per).mult(o.coh))}
}
class FlockDemo extends Base{
 reset(){this.boids=[];this.ensure(true)}
 ensure(force=false){const n=this.val('count');if(force)this.boids=[];while(this.boids.length<n)this.boids.push(new Boid(rand(0,this.w),rand(0,this.h),{maxSpeed:rand(2.2,3.8),maxForce:.075,r:rand(4.5,7.5),vel:V.angle(rand(0,Math.PI*2),rand(1.5,3.2))}));while(this.boids.length>n)this.boids.pop()}
 links(per){const c=this.ctx;c.save();c.strokeStyle='rgba(183,148,244,.12)';for(let i=0;i<this.boids.length;i++)for(let j=i+1;j<this.boids.length;j++)if(V.dist(this.boids[i].pos,this.boids[j].pos)<per)this.line(this.boids[i].pos,this.boids[j].pos,'rgba(183,148,244,.12)',1);c.restore()}
 tick(){super.tick();this.clear();this.ensure();this.grid(60);const o={sep:this.val('sep'),align:this.val('align'),coh:this.val('coh'),per:this.val('per'),sepDist:Math.max(14,this.val('per')*.45)};if(this.val('links'))this.links(o.per);for(const b of this.boids)b.flock(this.boids,o);for(const b of this.boids){b.update({w:this.w,h:this.h},'wrap');b.draw(this.ctx,C.green,.9)}this.label('separation = avoid | alignment = copy | cohesion = group-center')}
}

const classes={seek:SeekDemo,arrive:ArriveDemo,flee:FleeDemo,wander:WanderDemo,flow:FlowDemo,path:PathDemo,flock:FlockDemo};
const demos=defs.map(d=>new classes[d.id](d.id));demos.forEach(d=>d.reset());
let paused=false;document.getElementById('pauseBtn').onclick=e=>{paused=!paused;e.target.textContent=paused?'Resume':'Pause'};
document.getElementById('resetBtn').onclick=()=>demos.forEach(d=>d.reset());
function frame(){if(!paused)demos.forEach(d=>d.tick());requestAnimationFrame(frame)}frame();
})();
</script>
